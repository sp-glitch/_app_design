<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>하나로케어</title>


  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/font.css">
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/style.css">

  <script src="../js/jquery-1.12.4.min.js"></script>
  <script src="../js/custom.js"></script>
</head>

<body>
  <div class="wrap">
    <header id="Category">
      <div class="container">
        <button class="category-back" onclick="history.back();">
          <span class="material-symbols-outlined">
            <img src="../icon/chevron_left.svg" alt="">
          </span>
        </button>
        <h1 class="category-title">
          비밀번호 찾기
        </h1>
      </div>
    </header>
    <main class="content login-recover-id">
      <div class="tab-menu container">
        <button class="tab" data-tab="find-id">아이디 찾기</button>
        <button class="tab active" data-tab="find-password">비밀번호 찾기</button>
      </div>
      <div class="tab-content container">
        <div class="tab-panel" id="find-id">
          <div class="find-id-inner">
            <input type="radio" name="find-method" value="phone" id="radio-phone" checked hidden>
            <input type="radio" name="find-method" value="email" id="radio-email" hidden>
            <div class="find-methods">
              <label class="find-option" for="radio-phone">
                <span class="custom-radio"></span>
                <span class="label-text">등록 휴대폰 번호로 찾기</span>
              </label>
              <label class="find-option" for="radio-email">
                <span class="custom-radio"></span>
                <span class="label-text">등록 이메일로 찾기</span>
              </label>
            </div>

            <div class="find-content">
              <div class="content-panel phone-panel">
                <div class="form-body">
                  <div class="form-group">
                    <label class="form-label" for="user-name">이름</label>
                    <input type="text" id="user-name" name="userName" class="input-text" placeholder="이름 입력">
                    <!-- <span class="verification-message mt-12">이름을 입력해주세요.</span> -->
                  </div>
                  <div class=" form-group">
                    <div class="flex-label">
                      <label class="form-label" for="patient-phone">환자 휴대폰</label>
                    </div>
                    <div class="input-box mb-12">
                      <input type="text" id="patient-phone" name="patientPhone" class="input-text" placeholder="숫자만 입력">
                      <button class="btn btn-form">인증번호 받기</button>
                      <!-- <button class="btn btn-gray">인증번호 받기</button> -->
                    </div>
                    <div class="input-box">
                      <input type="text" id="verification-code" name="verificationCode" class="input-text"
                        placeholder="인증번호 입력">
                      <button class="btn btn-gray">인증하기</button>
                      <!-- <button class="btn btn-form">인증하기</button> -->
                    </div>
                    <span class="verification-message mt-12">인증번호가 발송되었습니다. 유효시간 03:00</span>
                    <!-- <span class="verification-message mt-12">인증번호가 일치하지 않습니다.</span> -->
                    <!-- <span class="verification-message-blue mt-12">인증이 완료되었습니다.</span> -->
                  </div>
                  <div class="form-group">
                    <a href="loginCompleteId.html" class="btn btn-pink">아이디 찾기</a>
                    <!-- <a href="#" class="btn btn-gray" disabled>아이디 찾기</a> -->
                  </div>
                </div>
              </div>
              <div class="content-panel email-panel">
                <div class="form-body">
                  <div class="form-group">
                    <label class="form-label" for="user-name">이름</label>
                    <input type="text" id="user-name" name="userName" class="input-text" placeholder="이름 입력">
                    <span class="verification-message mt-12">이름을 입력해주세요.</span>
                  </div>
                  <div class="form-group">
                    <label class="form-label" for="user-email">이메일</label>
                    <input type="text" id="user-email" name="userEmail" class="input-text" placeholder="이메일 입력">
                    <span class="verification-message mt-12">이메일을 입력해주세요.</span>
                  </div>
                  <div class="form-group">
                    <!-- <a href="loginCompletId.html" class="btn btn-pink">아이디 찾기</a> -->
                    <a href="#" class="btn btn-gray" disabled>아이디 찾기</a>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="tab-panel active" id="find-password">
          <div class="find-id-inner">
            <div class="find-content">
              <h2 class="form-title mb-20">변경할 비밀번호를 입력해주세요.</h2>
              <div class="form-body">
                <div class="form-group">
                  <label class="form-label" for="user-id">변경 비밀번호</label>
                  <input type="text" id="user-id" name="userId" class="input-text"
                    placeholder="영문+숫자+특수문자 조합 8자리 이상 입력">
                </div>
                <div class="form-group">
                  <label class="form-label" for="user-name">변경 비밀번호 확인</label>
                  <input type="text" id="user-name" name="userName" class="input-text" placeholder="변경 비밀번호 재입력">
                </div>
                <div class="form-group">
                  <a href="loginCompletePassword.html" class="btn btn-pink">확인</a>
                  <!-- <a href="#" class="btn btn-gray" disabled>확인</a> -->
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- 모달 -->
      <div id="passwordMismatchModal" class="modal">
        <div class="modal-content">
          <div class="modal-icon">
            <div class="complete-icon">
              <span class="material-symbols-outlined small-icon exclamation-icon">
                <img src="../icon/exclamation.svg" alt="">
              </span>
            </div>
          </div>
          <div class="modal-text mb-20">
            <h2 class="modal-summury">변경 비밀번호가 일치하지 않습니다.</h2>
            <p class="modal-message">정확하게 다시 입력해주세요.</p>
          </div>
          <div class="modal-footer">
            <button class="btn btn-pink" onclick="closePasswordMismatchModal()">확인</button>
          </div>
        </div>
      </div>

      <div id="passwordInvalidModal" class="modal">
        <div class="modal-content">
          <div class="modal-icon">
            <div class="complete-icon">
              <span class="material-symbols-outlined small-icon exclamation-icon">
                <img src="../icon/exclamation.svg" alt="">
              </span>
            </div>
          </div>
          <div class="modal-text mb-20">
            <h2 class="modal-summury">변경 비밀번호를 입력조건에 맞게<br />
              다시 입력해주세요.
            </h2>
          </div>
          <div class="modal-footer">
            <button class="btn btn-pink" onclick="closePasswordInvalidModal()">확인</button>
          </div>
        </div>
      </div>
    </main>
  </div>
</body>

</html>
