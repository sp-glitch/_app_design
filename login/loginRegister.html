<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>하나로케어</title>


  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/font.css">
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/style.css">

  <script src="../js/jquery-1.12.4.min.js"></script>
  <script src="../js/custom.js"></script>
</head>

<body>
  <div class="wrap">
    <header id="Category">
      <div class="container">
        <button class="category-back" onclick="history.back();">
          <span class="material-symbols-outlined">
            <img src="../icon/chevron_left.svg" alt="">
          </span>
        </button>
        <h1 class="category-title">
          회원가입
        </h1>
      </div>
    </header>
    <section class="login-indicator">
      <div class="reg-labels">
        <span class="reg-label active">약관동의</span>
        <span class="reg-label">정보입력</span>
        <span class="reg-label">가입완료</span>
      </div>
      <div class="reg-bar">
        <div class="reg-segment" id="progressStep1"></div>
        <div class="reg-segment" id="progressStep2"></div>
        <div class="reg-segment" id="progressStep3"></div>
      </div>
    </section>
    <section class="login-register">
      <div class="progress-content">
        <div class="reg-content active">
          <div class="status-wrapper">
            <div class="status-top">
              <h2 class="form-title-top">서비스 이용약관에 동의해 주세요.</h2>
            </div>
            <div class="full-divider"></div>
            <div class="status-detail container">
              <div class="form-header">
                <h2 class="form-title">
                  <label class="checkbox-flex">
                    <input type="checkbox">
                    <span>
                      전체 동의하기
                    </span>
                  </label>
                </h2>
                <p class="info-desc">전체 동의하기는 하나로케어 이용약관, 개인정보처리방침, <br />
                  민감정보 수집 · 이용에 대한 동의를 포함합니다.</p>
              </div>
              <div class="form-body status-form-body">
                <div class="status-row">
                  <div class="terms-left">
                    <input type="checkbox" id="terms1" />
                    <label for="terms1">
                      <span class="required">[필수]</span>
                      <span class="title">하나로케어 이용약관</span>
                    </label>
                  </div>
                  <button class="arrow-icon" onclick="goToTerms('loginTerms.html')">
                    <span class="material-symbols-outlined">
                      <img src="../icon/chevron_right.svg" alt="">
                    </span>
                  </button>
                </div>
                <div class="status-row">
                  <div class="terms-left">
                    <input type="checkbox" id="terms2" />
                    <label for="terms2">
                      <span class="required">[필수]</span>
                      <span class="title">개인정보처리방침</span>
                    </label>
                  </div>
                  <button class="arrow-icon" onclick="goToTerms('loginPrivacy.html')">
                    <span class="material-symbols-outlined">
                      <img src="../icon/chevron_right.svg" alt="">
                    </span>
                  </button>
                </div>
                <div class="status-row">
                  <div class="terms-left">
                    <input type="checkbox" id="terms3" />
                    <label for="terms3">
                      <span class="required">[필수]</span>
                      <span class="title">개인정보 수집 · 이용 동의</span>
                    </label>
                  </div>
                  <button class="arrow-icon" onclick="goToTerms('loginPersonal.html')">
                    <span class="material-symbols-outlined">
                      <img src="../icon/chevron_right.svg" alt="">
                    </span>
                  </button>
                </div>
                <div class="status-row">
                  <div class="terms-left">
                    <input type="checkbox" id="terms3" />
                    <label for="terms3">
                      <span class="required">[필수]</span>
                      <span class="title">민감정보 수집 · 이용 동의</span>
                    </label>
                  </div>
                  <button class="arrow-icon" onclick="goToTerms('loginData.html')">
                    <span class="material-symbols-outlined">
                      <img src="../icon/chevron_right.svg" alt="">
                    </span>
                  </button>
                </div>
                <div class="status-row marketing-row">
                  <div class="terms-left">
                    <label for="marketing-main">
                      <span class="optional">[선택]</span>
                      <span class="title">광고성 정보수신동의</span>
                    </label>
                  </div>
                  <button class="arrow-icon" onclick="goToTerms('loginMarketing.html')">
                    <span class="material-symbols-outlined">
                      <img src="../icon/chevron_right.svg" alt="">
                    </span>
                  </button>
                  <div class="marketing-sub-options">
                    <label class="sub-option">
                      <input type="checkbox" id="marketing-kakao" />
                      <span>문자/알림톡 메시지 수신동의</span>
                    </label>
                    <label class="sub-option">
                      <input type="checkbox" id="marketing-sms" />
                      <span>이메일 수신동의</span>
                    </label>
                  </div>
                </div>
                <p class="info-desc">* 필수항목을 모두 체크해 주세요.</p>
              </div>
            </div>
          </div>
        </div>
        <div class="reg-content container">
          <div class="form-body">
            <div class="form-group">
              <label class="form-label" for="patient-id">아이디</label>
              <div class="input-box">
                <input type="text" id="patient-id" name="patientId" class="input-text"
                  placeholder="영문/숫자 조합 6자리 이상 입력" />
                <button class="btn btn-form">중복확인</button>
              </div>
              <span class="verification-message-blue mt-12">사용가능한 ID입니다.</span>
              <!-- <span class="verification-message mt-12">사용할 수 없는 ID입니다.</span> -->
            </div>

            <div class="form-group">
              <label class="form-label" for="patient-password">비밀번호</label>
              <div class="input-box">
                <input type="password" id="patient-password" name="patientPassword" class="input-text"
                  placeholder="영문/숫자/특수문자 조합 8자리 이상 입력" />
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="patient-password-confirm">비밀번호 확인</label>
              <div class="input-box">
                <input type="password" id="patient-password-confirm" name="patientPasswordConfirm" class="input-text"
                  placeholder="비밀번호 재입력" />
              </div>
            </div>
            <div class="form-group">
              <label class="form-label" for="patient-name">회원명</label>
              <div class="input-box">
                <input type="text" id="patient-name" name="patientName" class="input-text" placeholder="회원명 입력" />
              </div>
            </div>
            <div class=" form-group">
              <div class="flex-label">
                <label class="form-label">휴대폰</label>
              </div>
              <div class="input-box mb-12">
                <input type="text" class="input-text" placeholder="숫자만 입력" />
                <button class="btn btn-form">인증 요청</button>
                <!-- <button class="btn btn-gray">인증 요청</button> -->
              </div>
              <div class="input-box">
                <input type="text" id="verification-code" name="verificationCode" class="input-text"
                  placeholder="인증번호 입력" />
                <button class="btn btn-gray">인증하기</button>
              </div>
              <span class="verification-message mt-12">인증번호가 발송되었습니다. 유효시간 03:00</span>
              <!-- <span class="verification-message mt-12">인증번호가 일치하지 않습니다.</span> -->
              <!-- <span class="verification-message-blue mt-12">인증이 완료되었습니다.</span> -->
            </div>
            <div class="form-group">
              <label class="form-label" for="patient-email">이메일</label>
              <div class="input-box">
                <input type="email" id="patient-email" name="patientEmail" class="input-text" placeholder="이메일 주소 입력" />
              </div>
            </div>
          </div>
        </div>
        <div class="reg-content mb-20">
          <div class="container reg-container">
            <div class="complete-icon">
              <span class="material-symbols-outlined big-icon check-icon">
                <img src="../icon/check_pink.svg" alt="">
              </span>
            </div>
            <h2 class="complete-title">하나로케어 회원가입이 완료되었습니다.</h2>
            <p class="complete-message">
              지금 바로 하나로케어 간병인 서비스를 경험해보세요
            </p>
          </div>
        </div>
      </div>
    </section>
    <section class="login-button container">
      <button id="regNextBtn" class="btn btn-pink">다음</button>
      <!-- <button id="regNextBtn" class="btn btn-gray">다음</button> -->
    </section>
  </div>
</body>

</html>
